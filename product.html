<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Arganity</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DIN Next LT Arabic', 'Segoe UI', Arial, sans-serif; background: #fff; color: #231f20; -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    ul { list-style: none; }
    :root {
      --green: #45a750; --green-dark: #3a8f43; --gold: #E9C177; --gold-dark: #D4A84E;
      --black: #231f20; --white: #ffffff; --off-white: #FAFAF8; --light-grey: #F4F4F2;
      --border: #E5E5E3; --text-muted: #6B6B6B;
    }
    .container { max-width: 1240px; margin: 0 auto; padding: 0 40px; }

    /* TOP BAR */
    .top-bar { background: var(--black); font-size: 12px; text-align: center; padding: 10px 40px; display: flex; align-items: center; justify-content: center; }
    .top-bar-center { font-weight: 700; color: var(--gold); letter-spacing: 0.15em; }

    /* HEADER */
    .site-header { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; transition: box-shadow 0.3s ease; }
    .header-inner { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 18px 40px; }
    .header-nav { display: flex; gap: 28px; align-items: center; }
    .header-nav a { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 400; color: var(--black); position: relative; padding-bottom: 3px; transition: color 0.2s; }
    .header-nav a::after { content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background: var(--gold); transform: translateX(-50%); transition: width 0.3s ease; }
    .header-nav a:hover { color: var(--green); }
    .header-nav a:hover::after, .header-nav a.active::after { width: 100%; }
    .header-nav a.active { color: var(--green); }
    .header-logo { text-align: center; display: flex; align-items: center; justify-content: center; }
    .header-actions { display: flex; gap: 20px; align-items: center; justify-content: flex-end; }
    .header-actions button, .header-actions a { background: none; border: none; cursor: pointer; color: var(--black); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; transition: color 0.2s; font-family: inherit; }
    .header-actions button:hover, .header-actions a:hover { color: var(--green); }
    .cart-count { background: var(--green); color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; }

    /* HAMBURGER */
    .hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; width: 44px; height: 44px; background: none; border: none; cursor: pointer; padding: 8px; border-radius: 8px; transition: background 0.2s; }
    .hamburger:hover { background: var(--light-grey); }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--black); border-radius: 2px; transition: all 0.3s ease; transform-origin: center; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* MOBILE NAV */
    .mobile-nav { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000; }
    .mobile-nav.open { display: flex; }
    .mobile-nav-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(2px); }
    .mobile-nav-drawer { position: relative; width: 80%; max-width: 300px; height: 100%; background: var(--white); display: flex; flex-direction: column; box-shadow: 4px 0 24px rgba(0,0,0,0.15); animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes slideInRTL { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .mobile-nav-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .mobile-nav-header img { height: 36px; }
    .mobile-nav-close { width: 36px; height: 36px; border-radius: 50%; background: var(--light-grey); border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .mobile-nav-links { flex: 1; overflow-y: auto; padding: 16px 0; }
    .mobile-nav-links a { display: flex; align-items: center; padding: 16px 24px; font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--black); border-bottom: 1px solid var(--border); transition: color 0.2s, background 0.2s; }
    .mobile-nav-links a:hover { color: var(--green); background: #f9fff9; }
    .mobile-nav-footer { padding: 24px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
    .mobile-nav-footer a { font-size: 12px; color: var(--text-muted); letter-spacing: 0.08em; }
    .lang-switch-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .lang-divider { color: rgba(0,0,0,0.2); font-size: 13px; }
    .footer-lang .lang-divider { color: rgba(255,255,255,0.3); }
    .lang-pill { background: none; border: none; cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-muted); padding: 0; font-family: inherit; transition: color 0.2s; }
    .lang-pill:hover { color: var(--green); }
    .lang-pill.active { color: var(--green); text-decoration: underline; text-underline-offset: 3px; }
    .footer-lang .lang-pill { color: rgba(255,255,255,0.45); }
    .footer-lang .lang-pill:hover { color: var(--gold); }
    .footer-lang .lang-pill.active { color: var(--gold); text-decoration: underline; text-underline-offset: 3px; }

    /* BREADCRUMB */
    .breadcrumb { padding: 16px 0; font-size: 12px; color: var(--text-muted); letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px; }
    .breadcrumb a { color: var(--text-muted); transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--green); }
    .breadcrumb span { color: var(--black); font-weight: 600; }

    /* PRODUCT LAYOUT */
    .product-section { padding: 32px 0 64px; }
    .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }

    /* GALLERY */
    .product-gallery { position: sticky; top: 90px; }
    .main-image-wrap { aspect-ratio: 1; background: var(--off-white); border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .main-image-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 24px; transition: transform 0.4s ease; }
    .main-image-wrap:hover img { transform: scale(1.05); }
    .thumbnails { display: flex; gap: 10px; }
    .thumb { width: 72px; height: 72px; border-radius: 8px; overflow: hidden; background: var(--off-white); border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: border-color 0.2s; }
    .thumb.active { border-color: var(--green); }
    .thumb:hover { border-color: var(--gold); }
    .thumb img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }

    /* PRODUCT INFO */
    .product-info { padding-top: 8px; }
    .product-category-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold-dark); font-weight: 700; margin-bottom: 10px; }
    .product-title { font-size: 28px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1.2; margin-bottom: 14px; color: var(--black); }
    .product-rating-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .stars { display: flex; gap: 3px; }
    .star { color: var(--gold); font-size: 16px; }
    .star.empty { color: var(--border); }
    .rating-count { font-size: 12px; color: var(--text-muted); }
    .product-price-row { font-size: 26px; font-weight: 700; color: var(--black); margin-bottom: 24px; }
    .price-currency { font-size: 16px; font-weight: 400; color: var(--text-muted); margin-left: 6px; }

    /* QUANTITY + BUTTONS */
    .purchase-row { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
    .qty-wrap { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: 50px; overflow: hidden; }
    .qty-btn { width: 38px; height: 46px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--black); transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
    .qty-btn:hover { background: var(--light-grey); }
    .qty-input { width: 44px; text-align: center; border: none; outline: none; font-size: 15px; font-weight: 700; font-family: inherit; background: transparent; }
    .btn-buy-now { flex: 1; padding: 14px 20px; background: var(--green); color: #fff; border: 2px solid var(--green); border-radius: 50px; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; text-align: center; font-family: inherit; }
    .btn-buy-now:hover { background: transparent; color: var(--green); }
    .btn-add-cart { width: 100%; padding: 14px 20px; background: transparent; color: var(--green); border: 2px solid var(--green); border-radius: 50px; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; text-align: center; font-family: inherit; margin-bottom: 20px; }
    .btn-add-cart:hover { background: var(--green); color: #fff; }

    /* SAFE CHECKOUT */
    .safe-checkout { border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 20px; text-align: center; }
    .safe-checkout-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); font-weight: 700; margin-bottom: 10px; }
    .payment-icons { display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
    .payment-icon { height: 32px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); display: flex; align-items: center; justify-content: center; }

    /* PRODUCT META */
    .product-meta { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: row; gap: 32px; flex-wrap: wrap; justify-content: center; }
    .meta-row { display: flex; flex-direction: column; gap: 4px; font-size: 13px; align-items: center; text-align: center; }
    .meta-label { font-weight: 700; color: var(--black); }
    .meta-val { color: var(--text-muted); }

    /* TABS */
    .product-tabs-section { border-top: 1px solid var(--border); }
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
    .tab-btn { padding: 18px 32px; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; background: none; border: none; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; font-family: inherit; }
    .tab-btn.active { color: var(--black); border-bottom-color: var(--black); }
    .tab-btn:hover { color: var(--green); }
    .tab-content { display: none; padding: 56px 0; }
    .tab-content.active { display: block; }

    /* DESCRIPTION TAB */
    .desc-title { font-size: 17px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; margin-bottom: 24px; color: var(--black); }
    .desc-text { font-size: 14px; line-height: 1.85; color: #444; margin-bottom: 16px; max-width: 860px; }
    .desc-text strong { color: var(--black); }
    .cert-badges { text-align: center; margin: 36px 0; }
    .cert-badges img { max-width: 500px; width: 100%; margin: 0 auto; }
    .desc-section-title { font-size: 16px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; margin-top: 36px; color: var(--black); }
    .desc-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
    .desc-list li { font-size: 14px; line-height: 1.7; color: #444; padding-left: 20px; position: relative; }
    .desc-list li::before { content: '•'; position: absolute; left: 0; color: var(--green); font-size: 16px; line-height: 1.5; }

    /* REVIEWS TAB */
    .reviews-summary { display: flex; gap: 48px; align-items: center; padding: 32px; background: var(--off-white); border-radius: 12px; margin-bottom: 40px; }
    .reviews-score { text-align: center; flex-shrink: 0; }
    .score-number { font-size: 56px; font-weight: 700; line-height: 1; color: var(--black); }
    .score-stars { display: flex; justify-content: center; gap: 4px; margin: 8px 0; }
    .score-label { font-size: 12px; color: var(--text-muted); }
    .reviews-bars { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: flex; align-items: center; gap: 12px; }
    .bar-label { font-size: 12px; color: var(--text-muted); width: 40px; text-align: right; flex-shrink: 0; }
    .bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.6s ease; }
    .bar-count { font-size: 12px; color: var(--text-muted); width: 24px; flex-shrink: 0; }

    /* REVIEW CARDS */
    .reviews-list { display: flex; flex-direction: column; gap: 24px; margin-bottom: 48px; }
    .review-card { padding: 24px; border: 1px solid var(--border); border-radius: 12px; background: var(--white); transition: box-shadow 0.2s; }
    .review-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .review-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .reviewer-info { display: flex; align-items: center; gap: 12px; }
    .reviewer-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .reviewer-name { font-size: 14px; font-weight: 700; color: var(--black); margin-bottom: 3px; }
    .reviewer-date { font-size: 11px; color: var(--text-muted); }
    .review-stars { display: flex; gap: 3px; }
    .review-body { font-size: 14px; line-height: 1.75; color: #555; }
    .review-verified { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--green); font-weight: 700; margin-top: 10px; letter-spacing: 0.05em; }

    /* WRITE A REVIEW */
    .write-review { background: var(--off-white); border-radius: 12px; padding: 36px; }
    .write-review h3 { font-size: 16px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 24px; color: var(--black); }
    .review-form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .review-form .full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--black); }
    .form-group input, .form-group textarea, .form-group select { padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; background: #fff; color: var(--black); transition: border-color 0.2s; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--green); }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .star-rating-input { display: flex; gap: 6px; flex-direction: row-reverse; justify-content: flex-end; }
    .star-rating-input input { display: none; }
    .star-rating-input label { font-size: 26px; color: var(--border); cursor: pointer; transition: color 0.15s; }
    .star-rating-input label:hover, .star-rating-input label:hover ~ label,
    .star-rating-input input:checked ~ label { color: var(--gold); }
    .btn-submit-review { margin-top: 8px; padding: 14px 40px; background: var(--black); color: #fff; border: 2px solid var(--black); border-radius: 50px; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; font-family: inherit; }
    .btn-submit-review:hover { background: transparent; color: var(--black); }

    /* RELATED PRODUCTS */
    .related-section { padding: 64px 0; border-top: 1px solid var(--border); }
    .section-eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dark); font-weight: 700; margin-bottom: 10px; }
    .section-title { font-size: 28px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 36px; }
    .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .product-card { background: var(--white); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); transition: all 0.3s ease; cursor: pointer; }
    .product-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.1); transform: translateY(-4px); border-color: var(--gold); }
    .product-img { aspect-ratio: 1; overflow: hidden; background: var(--light-grey); display: flex; align-items: center; justify-content: center; }
    .product-img img { width: 100%; height: 100%; object-fit: contain; padding: 16px; transition: transform 0.4s ease; }
    .product-card:hover .product-img img { transform: scale(1.06); }
    .product-card-info { padding: 18px; }
    .product-card-cat { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-dark); font-weight: 700; margin-bottom: 5px; }
    .product-card-name { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; line-height: 1.35; }
    .product-card-price { font-size: 15px; font-weight: 700; color: var(--black); margin-bottom: 14px; }
    .product-card-btn { width: 100%; padding: 10px; background: var(--green); color: #fff; border: 2px solid var(--green); border-radius: 50px; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; text-align: center; display: block; font-family: inherit; }
    .product-card-btn:hover { background: transparent; color: var(--green); }

    /* NEWSLETTER */
    .newsletter-section { background: linear-gradient(rgba(69,167,80,0.9), rgba(69,167,80,0.9)), url('images/pattern2.png') no-repeat center/cover, var(--green); padding: 64px 40px; text-align: center; }
    .newsletter-section h2 { font-size: 28px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; margin-bottom: 10px; }
    .newsletter-section p { font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.85); margin-bottom: 28px; }
    .newsletter-form { display: flex; max-width: 480px; margin: 0 auto; }
    .newsletter-form input { flex: 1; padding: 14px 20px; border: none; border-radius: 50px 0 0 50px; font-size: 14px; outline: none; font-family: inherit; }
    .newsletter-form button { padding: 14px 28px; background: var(--black); color: #fff; border: none; border-radius: 0 50px 50px 0; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; font-family: inherit; }
    .newsletter-form button:hover { background: var(--gold); }

    /* FOOTER */
    .site-footer { background: linear-gradient(rgba(35,31,32,0.9), rgba(35,31,32,0.9)), url('images/pattern2.png') no-repeat center/cover, var(--black); color: #fff; padding: 60px 0 0; }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; padding-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .footer-logo-text { margin-bottom: 16px; }
    .footer-tagline { font-size: 13px; font-weight: 300; line-height: 1.7; color: rgba(255,255,255,0.55); margin-bottom: 24px; }
    .footer-social { display: flex; gap: 10px; }
    .footer-social a { width: 38px; height: 38px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; }
    .footer-social a:hover { background: var(--gold); border-color: var(--gold); }
    .footer-col h4 { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; margin-bottom: 20px; }
    .footer-col ul li { margin-bottom: 10px; }
    .footer-col ul a { font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.55); transition: color 0.2s; }
    .footer-col ul a:hover { color: var(--gold); }
    .footer-bottom { padding: 20px 0; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: rgba(255,255,255,0.35); }
    .footer-bottom a { color: rgba(255,255,255,0.35); }
    .footer-bottom a:hover { color: var(--gold); }

    /* BACK TO TOP */
    #back-to-top { position: fixed; bottom: 28px; right: 28px; width: 44px; height: 44px; border-radius: 50%; background: var(--green); color: #fff; border: none; font-size: 18px; cursor: pointer; z-index: 9999; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(69,167,80,0.4); transition: all 0.3s; opacity: 0; visibility: hidden; }
    #back-to-top.visible { opacity: 1; visibility: visible; }
    #back-to-top:hover { background: var(--gold); transform: translateY(-3px); }

    /* RTL */
    [dir="rtl"] { font-family: 'DIN Next LT Arabic', 'Segoe UI', Arial, sans-serif; }
    [dir="rtl"] .header-nav { flex-direction: row-reverse; }
    [dir="rtl"] .header-actions { flex-direction: row-reverse; }
    [dir="rtl"] .header-inner { direction: rtl; }
    [dir="rtl"] .breadcrumb { flex-direction: row-reverse; }
    [dir="rtl"] .product-layout { direction: rtl; }
    [dir="rtl"] .product-info { text-align: right; }
    [dir="rtl"] .purchase-row { flex-direction: row-reverse; }
    [dir="rtl"] .desc-list li { padding-left: 0; padding-right: 20px; }
    [dir="rtl"] .desc-list li::before { left: auto; right: 0; }
    [dir="rtl"] .review-header { flex-direction: row-reverse; }
    [dir="rtl"] .reviewer-info { flex-direction: row-reverse; }
    [dir="rtl"] .review-body { text-align: right; }
    [dir="rtl"] .footer-grid { direction: rtl; text-align: right; }
    [dir="rtl"] .footer-social { flex-direction: row-reverse; }
    [dir="rtl"] .footer-bottom { flex-direction: row-reverse; }
    [dir="rtl"] .mobile-nav-links a { text-align: right; justify-content: flex-end; }
    [dir="rtl"] .mobile-nav-drawer { left: auto; right: 0; animation-name: slideInRTL; }
    [dir="rtl"] .newsletter-form { flex-direction: row-reverse; }
    [dir="rtl"] .newsletter-form input { border-radius: 0 50px 50px 0; }
    [dir="rtl"] .newsletter-form button { border-radius: 50px 0 0 50px; }

    + '<footer class="site-footer"><div class="container"><div class="footer-grid"><div><div class="footer-logo-text"><img src="images/logo1.png.png" alt="Arganity" style="height:36px;width:auto;filter:brightness(0) invert(1);display:block;"></div><p class="footer-tagline">A luxury organic skincare brand inspired by the rich beauty traditions of Morocco. From the Atlas Mountains to Doha, Qatar.</p><div class="footer-social"><a href="#">ig</a><a href="#">fb</a><a href="#">tk</a></div></div><div class="footer-col"><h4>Shop</h4><ul><li><a href="shop.html">All Products</a></li><li><a href="shop.html?cat=prickly-pear">Prickly Pear Seeds</a></li><li><a href="shop.html?cat=argan">Argan Oil</a></li><li><a href="shop.html?cat=cannabis">Cannabis Oil</a></li></ul></div><div class="footer-col"><h4>Company</h4><ul><li><a href="about.html">About Arganity</a></li><li><a href="about.html">Our Story</a></li><li><a href="contact.html">Contact Us</a></li></ul></div><div class="footer-col"><h4>Support</h4><ul><li><a href="#">Shipping Info</a></li><li><a href="#">Returns & Refunds</a></li><li><a href="#">Privacy Policy</a></li><li><a href="#">FAQ</a></li></ul></div></div><div class="footer-bottom"><span>© 2026 Arganity.com. Doha, Qatar.</span><span style="display:flex;align-items:center;gap:12px;"><a href="#">Privacy</a> &nbsp;·&nbsp; <a href="#">Terms</a> &nbsp;·&nbsp; <span class="lang-switch-row footer-lang"><button class="lang-pill active" data-lang="en">EN</button><span class="lang-divider">|</span><button class="lang-pill" data-lang="ar">AR</button></span></span></div></div></footer>';

    // Quantity buttons
    document.getElementById('qtyMinus').addEventListener('click', function() {
      var inp = document.getElementById('qtyInput');
      if (parseInt(inp.value) > 1) inp.value = parseInt(inp.value) - 1;
    });
    document.getElementById('qtyPlus').addEventListener('click', function() {
      var inp = document.getElementById('qtyInput');
      if (parseInt(inp.value) < 99) inp.value = parseInt(inp.value) + 1;
    });

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        btn.classList.add('active');
        document.getElementById('tab-' + btn.getAttribute('data-tab')).classList.add('active');
      });
    });

    // Lang switcher (all .lang-pill)
    initLang();
  }

  // ==============================
  // LOAD PRODUCT
  // ==============================
  var urlId = parseInt(new URLSearchParams(window.location.search).get('id')) || 1;
  var product = products[urlId] || products[1];
  buildPage(product);

  // ==============================
  // HAMBURGER
  // ==============================
  var hamburger = document.getElementById('hamburger');
  var mobileNav = document.getElementById('mobileNav');
  var mobileNavClose = document.getElementById('mobileNavClose');
  var backdrop = document.getElementById('mobileNavBackdrop');
  function openNav() { mobileNav.classList.add('open'); hamburger.classList.add('open'); document.body.style.overflow = 'hidden'; }
  function closeNav() { mobileNav.classList.remove('open'); hamburger.classList.remove('open'); document.body.style.overflow = ''; }
  hamburger.addEventListener('click', openNav);
  mobileNavClose.addEventListener('click', closeNav);
  backdrop.addEventListener('click', closeNav);
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeNav(); });
  document.querySelectorAll('.mobile-nav-links a').forEach(function(l) { l.addEventListener('click', closeNav); });

  // ==============================
  // BACK TO TOP + SCROLL
  // ==============================
  var backBtn = document.getElementById('back-to-top');
  var header = document.querySelector('.site-header');
  window.addEventListener('scroll', function() {
    header.style.boxShadow = window.pageYOffset > 50 ? '0 2px 16px rgba(0,0,0,0.08)' : 'none';
    backBtn.classList.toggle('visible', window.pageYOffset > 400);
  }, { passive: true });
  backBtn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });

  // ==============================
  // LANGUAGE SWITCHER
  // ==============================
  var translations = {
    en: { 'topbar-shipping': '✦ FREE SHIPPING ON ORDERS OVER 200 QAR ✦', 'nav-home': 'Home', 'nav-shop': 'Shop', 'nav-about': 'About', 'nav-contact': 'Contact' },
    ar: { 'topbar-shipping': '✦ شحن مجاني للطلبات فوق 200 ريال قطري ✦', 'nav-home': 'الرئيسية', 'nav-shop': 'المتجر', 'nav-about': 'من نحن', 'nav-contact': 'تواصل معنا' }
  };

  function initLang() {
    document.querySelectorAll('.lang-pill').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var lang = btn.getAttribute('data-lang');
        document.querySelectorAll('.lang-pill').forEach(function(b) { b.classList.remove('active'); });
        document.querySelectorAll('.lang-pill[data-lang="' + lang + '"]').forEach(function(b) { b.classList.add('active'); });
        document.documentElement.setAttribute('lang', lang);
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
        var t = translations[lang];
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
          var key = el.getAttribute('data-i18n');
          if (t[key]) el.innerHTML = t[key];
        });
      });
    });
  }
  </script>
</body>
